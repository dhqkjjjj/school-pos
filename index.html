<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校慶 POS - 編號優化版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --accent: #e67e22; --danger: #e74c3c; --noodle: #f39c12; --tofu: #9b59b6; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .login-input { padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 1px solid #ccc; width: 200px; text-align: center; margin-bottom: 15px; }
        #main-content { display: none; } 
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 90vh; }
        .mode-nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .mode-nav button { padding: 12px 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #eee; }
        .mode-nav .active { background: var(--primary); color: white; }
        .item-card { border: 2px solid #f0f0f0; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-round { width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 1.5rem; cursor: pointer; background: #eee; }
        .order-ticket { padding: 15px; margin-bottom: 12px; border-radius: 10px; color: white; }
        .noodle-ticket { background: var(--noodle); }
        .tofu-ticket { background: var(--tofu); }
        .btn-done { width: 100%; margin-top: 10px; padding: 8px; background: rgba(255,255,255,0.3); border: 1px solid white; color: white; border-radius: 5px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; text-align: center; width: 85%; }
        .status-dot { font-size: 0.8rem; text-align: center; margin-bottom: 10px; color: #7f8c8d; }
        #audio-tip { background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 10px; text-align: center; cursor: pointer; border: 1px solid #ffeeba; }
        .calc-input { width: 100%; padding: 10px; font-size: 1.5rem; margin: 10px 0; border: 2px solid #eee; border-radius: 8px; text-align: center; box-sizing: border-box; }
        .change-result { font-size: 1.8rem; color: var(--danger); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>🔒 請輸入通行碼</h2>
    <input type="password" id="pass-input" class="login-input" placeholder="123">
    <button onclick="checkPass()" style="padding:10px 40px; background:var(--primary); color:white; border:none; border-radius:5px; font-weight:bold;">登入</button>
</div>

<div id="main-content">
    <div class="container">
        <div id="audio-tip" onclick="enableAudio()">📣 點擊開啟訂單音效 (叮)</div>
        <div class="status-dot" id="conn-status" onclick="handleResetSecret()">📡 正在連線...</div>
        
        <div class="mode-nav">
            <button id="nav-cashier" onclick="switchMode('cashier')" class="active">💰 收銀</button>
            <button id="nav-k-noodle" onclick="switchMode('k-noodle')">🍜 麵區</button>
            <button id="nav-k-tofu" onclick="switchMode('k-tofu')">🍧 豆花區</button>
        </div>

        <div id="view-cashier">
            <div class="item-card">
                <div><div style="font-weight:bold;">🍜 炒泡麵 $65</div><div style="font-size:0.8rem; color:gray;">剩餘: <span id="stk-noodle">---</span></div></div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-round" onclick="changeQty('noodle', -1)">-</button>
                    <span id="qty-noodle" style="margin:0 15px; font-weight:bold;">0</span>
                    <button class="btn-round" style="background:var(--primary); color:white;" onclick="changeQty('noodle', 1)">+</button>
                </div>
            </div>
            <div class="item-card">
                <div><div style="font-weight:bold;">🍧 豆花 $45</div><div style="font-size:0.8rem; color:gray;">剩餘: <span id="stk-tofu">---</span></div></div>
                <div style="display:flex; align-items:center;">
                    <button class="btn-round" onclick="changeQty('tofu', -1)">-</button>
                    <span id="qty-tofu" style="margin:0 15px; font-weight:bold;">0</span>
                    <button class="btn-round" style="background:var(--primary); color:white;" onclick="changeQty('tofu', 1)">+</button>
                </div>
            </div>
            <div style="text-align:right; font-size:1.5rem; font-weight:bold; margin-bottom:15px; color:var(--danger);">總計: <span id="total-price">$0</span></div>
            <button onclick="openConfirm()" style="width:100%; padding:18px; background:var(--secondary); color:white; border:none; border-radius:10px; font-size:1.2rem; font-weight:bold;">確認結帳送單</button>
        </div>

        <div id="view-k-noodle" style="display:none;"><h2>🍜 麵區待作</h2><div id="list-noodle"></div></div>
        <div id="view-k-tofu" style="display:none;"><h2>🍧 豆花待作</h2><div id="list-tofu"></div></div>
    </div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">💰 結帳找錢幫手</h3>
        <p id="modal-detail" style="font-size:1.1rem; margin-bottom:10px;"></p>
        <div style="background:#f9f9f9; padding:15px; border-radius:10px;">
            <input type="number" id="cash-received" class="calc-input" placeholder="對方付了多少" oninput="calculateChange()">
            <div id="change-amount" class="change-result">$0</div>
        </div>
        <button onclick="submitOrder()" style="width:100%; padding:15px; background:var(--secondary); color:white; border:none; border-radius:8px; margin-top:15px; font-size:1.1rem; font-weight:bold;">確認收錢並送單</button>
        <button onclick="closeConfirm()" style="width:100%; margin-top:10px; border:none; background:none; color:gray;">返回修改</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDTqa6YKnXOSeuMkxcOVWK7cC8orklePGU",
        authDomain: "school-faee6.firebaseapp.com",
        projectId: "school-faee6",
        storageBucket: "school-faee6.firebasestorage.app",
        messagingSenderId: "48853339335",
        appId: "1:48853339335:web:31eda5ea2618e79828c2e2",
        measurementId: "G-8Q4JSD8VB1",
        databaseURL: "https://school-faee6-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const soundOrder = new Audio('https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3');

    let cart = { noodle: 0, tofu: 0 };
    let currentStock = { noodle: 200, tofu: 200 };
    let orderNum = 0; // 當前流水號
    let lastOrderIds = new Set();
    let firstLoad = true;
    let currentMode = 'cashier';
    let currentTotal = 0;

    function enableAudio() {
        soundOrder.play().then(() => { soundOrder.pause(); document.getElementById('audio-tip').style.display = 'none'; });
    }

    function checkPass() {
        if (document.getElementById('pass-input').value === '123') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            startApp();
        } else { alert('密碼錯誤！'); }
    }

    function startApp() {
        // 監聽流水號
        db.ref('orderCount').on('value', s => { orderNum = s.val() || 0; });

        // 監聽庫存
        db.ref('stock').on('value', s => {
            const data = s.val();
            if (data) {
                currentStock = data;
                document.getElementById('stk-noodle').innerText = data.noodle;
                document.getElementById('stk-tofu').innerText = data.tofu;
            } else { db.ref('stock').set({ noodle: 200, tofu: 200 }); }
        });

        // 監聽訂單
        db.ref('orders').on('value', (snapshot) => {
            const orders = [];
            let hasNewOrder = false;
            snapshot.forEach(child => { 
                const key = child.key;
                orders.push({ key: key, ...child.val() }); 
                if (!lastOrderIds.has(key)) hasNewOrder = true;
            });
            lastOrderIds = new Set(orders.map(o => o.key));
            if (!firstLoad && hasNewOrder && currentMode !== 'cashier') {
                soundOrder.currentTime = 0;
                soundOrder.play().catch(e => {});
            }
            firstLoad = false;
            renderKitchen(orders);
            document.getElementById('conn-status').innerText = "🟢 雲端同步中";
        });
    }

    function switchMode(mode) {
        currentMode = mode;
        ['view-cashier', 'view-k-noodle', 'view-k-tofu'].forEach(id => document.getElementById(id).style.display = 'none');
        ['nav-cashier', 'nav-k-noodle', 'nav-k-tofu'].forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById('view-' + mode).style.display = 'block';
        document.getElementById('nav-' + mode).classList.add('active');
    }

    function changeQty(item, delta) {
        let n = cart[item] + delta;
        if (n >= 0 && n <= 9 && n <= currentStock[item]) {
            cart[item] = n;
            document.getElementById('qty-' + item).innerText = n;
            calculate();
        }
    }

    function calculate() {
        let combo = Math.min(cart.noodle, cart.tofu);
        currentTotal = (combo * 100) + ((cart.noodle - combo) * 65) + ((cart.tofu - combo) * 45);
        document.getElementById('total-price').innerText = '$' + currentTotal;
        return currentTotal;
    }

    function openConfirm() {
        if (cart.noodle === 0 && cart.tofu === 0) return;
        document.getElementById('modal-detail').innerHTML = `麵 x ${cart.noodle} / 豆花 x ${cart.tofu}<br><b>總計：${currentTotal} 元</b>`;
        document.getElementById('cash-received').value = ""; 
        document.getElementById('change-amount').innerText = "$0";
        document.getElementById('confirmModal').style.display = 'flex';
    }

    function calculateChange() {
        const received = document.getElementById('cash-received').value;
        if (received >= currentTotal) {
            document.getElementById('change-amount').innerText = "$" + (received - currentTotal);
            document.getElementById('change-amount').style.color = "var(--secondary)";
        } else {
            document.getElementById('change-amount').innerText = "不足";
            document.getElementById('change-amount').style.color = "var(--danger)";
        }
    }

    function closeConfirm() { document.getElementById('confirmModal').style.display = 'none'; }

    function submitOrder() {
        // 更新號碼並格式化為 #0001
        const nextNum = orderNum + 1;
        const formattedId = nextNum.toString().padStart(4, '0');
        const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        // 同步到 Firebase
        db.ref('orderCount').set(nextNum);
        db.ref('orders').push({ id: formattedId, noodle: cart.noodle, tofu: cart.tofu, time: timestamp });
        db.ref('stock').set({ noodle: currentStock.noodle - cart.noodle, tofu: currentStock.tofu - cart.tofu });

        cart = { noodle: 0, tofu: 0 };
        document.getElementById('qty-noodle').innerText = '0';
        document.getElementById('qty-tofu').innerText = '0';
        calculate();
        closeConfirm();
    }

    function renderKitchen(orders) {
        const nList = document.getElementById('list-noodle');
        const tList = document.getElementById('list-tofu');
        nList.innerHTML = ""; tList.innerHTML = "";
        orders.forEach(ord => {
            if (ord.noodle > 0) nList.innerHTML += `<div class="order-ticket noodle-ticket">#${ord.id} [${ord.time}]<br><b>🍜 麵 x ${ord.noodle}</b><button class="btn-done" onclick="completeOrder('${ord.key}', 'noodle')">製作完成</button></div>`;
            if (ord.tofu > 0) tList.innerHTML += `<div class="order-ticket tofu-ticket">#${ord.id} [${ord.time}]<br><b>🍧 豆花 x ${ord.tofu}</b><button class="btn-done" onclick="completeOrder('${ord.key}', 'tofu')">製作完成</button></div>`;
        });
    }

    function completeOrder(key, type) {
        db.ref('orders/' + key).once('value', s => {
            const v = s.val(); if (!v) return;
            const up = {}; up[type] = 0;
            db.ref('orders/' + key).update(up).then(() => {
                db.ref('orders/' + key).once('value', s2 => {
                    const v2 = s2.val(); if (v2.noodle === 0 && v2.tofu === 0) db.ref('orders/' + key).remove();
                });
            });
        });
    }

    function handleResetSecret() {
        let resetClicks = (window.r_clicks || 0) + 1; window.r_clicks = resetClicks;
        if (resetClicks >= 5) {
            const pw = prompt("管理密碼：");
            if (pw === '123') {
                db.ref('orders').remove();
                db.ref('stock').set({ noodle: 200, tofu: 200 });
                db.ref('orderCount').set(0); // 號碼歸零
                alert("已全部重製！編號將從 #0001 開始");
            }
            window.r_clicks = 0;
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校慶 POS - Firebase 專業版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --accent: #e67e22; --danger: #e74c3c; --noodle: #f39c12; --tofu: #9b59b6; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 90vh; }
        .mode-nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .mode-nav button { padding: 12px 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #eee; }
        .mode-nav .active { background: var(--primary); color: white; }
        .item-card { border: 2px solid #f0f0f0; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-round { width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 1.5rem; cursor: pointer; background: #eee; }
        .qty-display { font-size: 1.3rem; font-weight: bold; min-width: 25px; text-align: center; }
        .order-ticket { padding: 15px; margin-bottom: 12px; border-radius: 10px; color: white; position: relative; }
        .noodle-ticket { background: var(--noodle); }
        .tofu-ticket { background: var(--tofu); }
        .btn-done { width: 100%; margin-top: 10px; padding: 8px; background: rgba(255,255,255,0.3); border: 1px solid white; color: white; border-radius: 5px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; text-align: center; width: 80%; }
        .status-dot { font-size: 0.8rem; text-align: center; margin-bottom: 10px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-dot" id="conn-status">📡 正在連線至 Firebase...</div>
    <div class="mode-nav">
        <button id="nav-cashier" onclick="switchMode('cashier')" class="active">💰 收銀</button>
        <button id="nav-k-noodle" onclick="switchMode('k-noodle')">🍜 麵區</button>
        <button id="nav-k-tofu" onclick="switchMode('k-tofu')">🍧 豆花區</button>
    </div>

    <div id="view-cashier">
        <div class="item-card">
            <div>
                <div style="font-weight:bold; font-size:1.1rem;">🍜 炒泡麵 $65</div>
                <div style="font-size:0.85rem; color:gray;">剩餘庫存: <span id="stk-noodle">---</span></div>
            </div>
            <div style="display:flex; align-items:center;">
                <button class="btn-round" onclick="changeQty('noodle', -1)">-</button>
                <div class="qty-display" id="qty-noodle">0</div>
                <button class="btn-round" style="background:var(--primary); color:white;" onclick="changeQty('noodle', 1)">+</button>
            </div>
        </div>

        <div class="item-card">
            <div>
                <div style="font-weight:bold; font-size:1.1rem;">🍧 豆花 $45</div>
                <div style="font-size:0.85rem; color:gray;">剩餘庫存: <span id="stk-tofu">---</span></div>
            </div>
            <div style="display:flex; align-items:center;">
                <button class="btn-round" onclick="changeQty('tofu', -1)">-</button>
                <div class="qty-display" id="qty-tofu">0</div>
                <button class="btn-round" style="background:var(--primary); color:white;" onclick="changeQty('tofu', 1)">+</button>
            </div>
        </div>

        <div style="margin:20px 0; border-top:1px solid #eee; padding-top:15px;">
            <div style="display:flex; justify-content:space-between; font-size:1.5rem; font-weight:bold;">
                <span>總金額</span>
                <span id="total-price" style="color:var(--danger);">$0</span>
            </div>
            <button onclick="openConfirm()" style="width:100%; margin-top:15px; padding:18px; background:var(--secondary); color:white; border:none; border-radius:10px; font-size:1.3rem; font-weight:bold; cursor:pointer;">確認結帳送單</button>
        </div>
    </div>

    <div id="view-k-noodle" style="display:none;"><h2 style="color:var(--noodle); text-align:center;">🍜 麵區待作清單</h2><div id="list-noodle"></div></div>
    <div id="view-k-tofu" style="display:none;"><h2 style="color:var(--tofu); text-align:center;">🍧 豆花待作清單</h2><div id="list-tofu"></div></div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-content">
        <h3>💰 確認收錢</h3>
        <p id="modal-detail" style="font-size:1.2rem; line-height:1.6;"></p>
        <button onclick="submitOrder()" style="width:100%; padding:15px; background:var(--secondary); color:white; border:none; border-radius:8px; font-size:1.1rem; font-weight:bold;">確認送出</button>
        <button onclick="closeConfirm()" style="width:100%; margin-top:10px; background:none; border:none; color:gray;">返回修改</button>
    </div>
</div>

<script>
    // --- 已填入你的 Firebase 設定 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDTqa6YKnXOSeuMkxcOVWK7cC8orklePGU",
        authDomain: "school-faee6.firebaseapp.com",
        projectId: "school-faee6",
        storageBucket: "school-faee6.firebasestorage.app",
        messagingSenderId: "48853339335",
        appId: "1:48853339335:web:31eda5ea2618e79828c2e2",
        measurementId: "G-8Q4JSD8VB1",
        databaseURL: "https://school-faee6-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = { noodle: 0, tofu: 0 };
    let currentStock = { noodle: 200, tofu: 200 };

    // 1. 監聽庫存
    db.ref('stock').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            currentStock = data;
            document.getElementById('stk-noodle').innerText = data.noodle;
            document.getElementById('stk-tofu').innerText = data.tofu;
        } else {
            // 初始化庫存為 200
            db.ref('stock').set({ noodle: 200, tofu: 200 });
        }
    });

    // 2. 監聽訂單
    db.ref('orders').on('value', (snapshot) => {
        const orders = [];
        snapshot.forEach(child => { orders.push({ key: child.key, ...child.val() }); });
        renderKitchen(orders);
        document.getElementById('conn-status').innerText = "🟢 雲端同步中 (跨裝置已啟用)";
    });

    function switchMode(mode) {
        ['view-cashier', 'view-k-noodle', 'view-k-tofu'].forEach(id => document.getElementById(id).style.display = 'none');
        ['nav-cashier', 'nav-k-noodle', 'nav-k-tofu'].forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById('view-' + mode).style.display = 'block';
        document.getElementById('nav-' + mode).classList.add('active');
    }

    function changeQty(item, delta) {
        let n = cart[item] + delta;
        if (n >= 0 && n <= 9 && n <= currentStock[item]) {
            cart[item] = n;
            document.getElementById('qty-' + item).innerText = n;
            calculate();
        }
    }

    function calculate() {
        let combo = Math.min(cart.noodle, cart.tofu);
        let total = (combo * 100) + ((cart.noodle - combo) * 65) + ((cart.tofu - combo) * 45);
        document.getElementById('total-price').innerText = '$' + total;
        return total;
    }

    function openConfirm() {
        if (cart.noodle === 0 && cart.tofu === 0) return;
        document.getElementById('modal-detail').innerHTML = `炒泡麵 x ${cart.noodle}<br>豆花 x ${cart.tofu}<br><b>應收金額：${calculate()} 元</b>`;
        document.getElementById('confirmModal').style.display = 'flex';
    }

    function closeConfirm() { document.getElementById('confirmModal').style.display = 'none'; }

    function submitOrder() {
        const orderId = Date.now().toString().slice(-4);
        const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        // 寫入雲端訂單與扣庫存
        db.ref('orders').push({ id: orderId, noodle: cart.noodle, tofu: cart.tofu, time: timestamp });
        db.ref('stock').set({ 
            noodle: currentStock.noodle - cart.noodle, 
            tofu: currentStock.tofu - cart.tofu 
        });

        cart = { noodle: 0, tofu: 0 };
        document.getElementById('qty-noodle').innerText = '0';
        document.getElementById('qty-tofu').innerText = '0';
        calculate();
        closeConfirm();
    }

    function renderKitchen(orders) {
        const nList = document.getElementById('list-noodle');
        const tList = document.getElementById('list-tofu');
        nList.innerHTML = ""; tList.innerHTML = "";

        orders.forEach(ord => {
            if (ord.noodle > 0) {
                nList.innerHTML += `<div class="order-ticket noodle-ticket">單號 #${ord.id} [${ord.time}]<br><b>🍜 炒泡麵 x ${ord.noodle}</b><button class="btn-done" onclick="completeOrder('${ord.key}', 'noodle')">製作完成</button></div>`;
            }
            if (ord.tofu > 0) {
                tList.innerHTML += `<div class="order-ticket tofu-ticket">單號 #${ord.id} [${ord.time}]<br><b>🍧 豆花 x ${ord.tofu}</b><button class="btn-done" onclick="completeOrder('${ord.key}', 'tofu')">製作完成</button></div>`;
            }
        });
    }

    function completeOrder(key, type) {
        db.ref('orders/' + key).once('value', snapshot => {
            const val = snapshot.val();
            if (!val) return;
            const update = {};
            update[type] = 0;
            db.ref('orders/' + key).update(update).then(() => {
                db.ref('orders/' + key).once('value', s => {
                    const v = s.val();
                    if (v.noodle === 0 && v.tofu === 0) db.ref('orders/' + key).remove();
                });
            });
        });
    }
</script>
</body>
</html>
